<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 2160" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#15243d"/>
      <stop offset="100%" stop-color="#050912"/>
    </radialGradient>
    <radialGradient id="medallion" cx="32%" cy="26%" r="80%">
      <stop offset="0%" stop-color="#d6ecf8"/>
      <stop offset="55%" stop-color="#9fcfeb"/>
      <stop offset="100%" stop-color="#1f3a52"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="frost" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M0 100 L 80 100 M120 100 L 200 100 M100 0 L 100 80 M100 120 L 100 200 M40 40 L 70 70 M130 130 L 160 160 M40 160 L 70 130 M130 70 L 160 40"
            stroke="rgba(159,207,235,0.06)" stroke-width="1" stroke-linecap="round"/>
    </pattern>
  </defs>

  <rect width="1080" height="2160" fill="url(#bg)"/>
  <rect width="1080" height="2160" fill="url(#frost)"/>

  <!-- decorative scattered tiny crosses, hand-placed -->
  <g stroke="rgba(159,207,235,0.18)" stroke-width="2" stroke-linecap="round">
    <path d="M120 280 v40 M100 300 h40"/>
    <path d="M960 360 v30 M945 375 h30"/>
    <path d="M180 1700 v36 M162 1718 h36"/>
    <path d="M920 1820 v40 M900 1840 h40"/>
    <path d="M540 220 v24 M528 232 h24"/>
    <path d="M210 1140 v28 M196 1154 h28"/>
    <path d="M880 1100 v28 M866 1114 h28"/>
  </g>

  <!-- snowflake sigil -->
  <g transform="translate(540 980)" filter="url(#glow)">
    <g stroke="#d6ecf8" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <g id="arm">
        <line x1="0" y1="0" x2="0" y2="-300"/>
        <line x1="0" y1="-114" x2="-44" y2="-150"/>
        <line x1="0" y1="-114" x2="44" y2="-150"/>
        <line x1="0" y1="-200" x2="-32" y2="-228"/>
        <line x1="0" y1="-200" x2="32" y2="-228"/>
        <line x1="0" y1="-280" x2="-18" y2="-294"/>
        <line x1="0" y1="-280" x2="18" y2="-294"/>
      </g>
      <use href="#arm" transform="rotate(60)"/>
      <use href="#arm" transform="rotate(120)"/>
      <use href="#arm" transform="rotate(180)"/>
      <use href="#arm" transform="rotate(240)"/>
      <use href="#arm" transform="rotate(300)"/>
    </g>
    <circle r="44" fill="url(#medallion)" stroke="#0a1424" stroke-width="6"/>
    <circle r="12" fill="#d6ecf8"/>
  </g>

  <!-- wordmark — generic serif fallback; embeds gracefully on iOS -->
  <g text-anchor="middle" font-family="'IM Fell English SC', 'Cormorant SC', 'Cinzel', Georgia, serif" fill="#bfdef0">
    <text x="540" y="1480" font-size="92" letter-spacing="22" opacity="0.95">FROSTHAVEN</text>
    <text x="540" y="1556" font-size="34" letter-spacing="14" fill="#4a7a98" opacity="0.9">COMPANION CODEX</text>
  </g>

  <!-- decorative flanking rules -->
  <g stroke="rgba(159,207,235,0.45)" stroke-width="2" stroke-linecap="round">
    <line x1="220" y1="1430" x2="370" y2="1430"/>
    <line x1="710" y1="1430" x2="860" y2="1430"/>
  </g>
</svg>
