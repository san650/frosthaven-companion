<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="70%">
      <stop offset="0%" stop-color="#15243d"/>
      <stop offset="100%" stop-color="#050912"/>
    </radialGradient>
    <radialGradient id="medallion" cx="32%" cy="26%" r="80%">
      <stop offset="0%" stop-color="#d6ecf8"/>
      <stop offset="55%" stop-color="#9fcfeb"/>
      <stop offset="100%" stop-color="#1f3a52"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256 260)" filter="url(#glow)">
    <g stroke="#bfdef0" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <g id="arm">
        <line x1="0" y1="0" x2="0" y2="-150"/>
        <line x1="0" y1="-58" x2="-22" y2="-78"/>
        <line x1="0" y1="-58" x2="22" y2="-78"/>
        <line x1="0" y1="-100" x2="-16" y2="-118"/>
        <line x1="0" y1="-100" x2="16" y2="-118"/>
        <line x1="0" y1="-138" x2="-9" y2="-148"/>
        <line x1="0" y1="-138" x2="9" y2="-148"/>
      </g>
      <use href="#arm" transform="rotate(60)"/>
      <use href="#arm" transform="rotate(120)"/>
      <use href="#arm" transform="rotate(180)"/>
      <use href="#arm" transform="rotate(240)"/>
      <use href="#arm" transform="rotate(300)"/>
    </g>
    <circle r="22" fill="url(#medallion)" stroke="#0a1424" stroke-width="3"/>
    <circle r="6" fill="#d6ecf8"/>
  </g>
</svg>
