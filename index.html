<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a1424" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Frosthaven" />
  <meta name="format-detection" content="telephone=no" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/app/icon-180.svg" />
  <link rel="icon" type="image/svg+xml" href="./icons/app/icon.svg" />

  <!-- iPhone PWA splash. iOS requires PNGs at the exact device pixel size,
       selected via media queries on CSS-pixel dimensions and device pixel
       ratio. PNGs are generated from icons/app/splash.svg via rsvg-convert. -->
  <!-- iPhone 14/15 Pro Max -->
  <link rel="apple-touch-startup-image" href="./icons/app/splash/splash-1290x2796.png"
        media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
  <!-- iPhone 12/13/14 Pro Max -->
  <link rel="apple-touch-startup-image" href="./icons/app/splash/splash-1284x2778.png"
        media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
  <!-- iPhone 14/15 Pro -->
  <link rel="apple-touch-startup-image" href="./icons/app/splash/splash-1179x2556.png"
        media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
  <!-- iPhone 12/13/14, 12/13 Pro -->
  <link rel="apple-touch-startup-image" href="./icons/app/splash/splash-1170x2532.png"
        media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
  <!-- iPhone X/XS/11 Pro, 12/13 mini -->
  <link rel="apple-touch-startup-image" href="./icons/app/splash/splash-1125x2436.png"
        media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
  <!-- iPhone XS Max / 11 Pro Max -->
  <link rel="apple-touch-startup-image" href="./icons/app/splash/splash-1242x2688.png"
        media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
  <!-- iPhone XR / 11 -->
  <link rel="apple-touch-startup-image" href="./icons/app/splash/splash-828x1792.png"
        media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
  <!-- iPhone 6+/7+/8+ -->
  <link rel="apple-touch-startup-image" href="./icons/app/splash/splash-1242x2208.png"
        media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
  <!-- iPhone 6/7/8/SE 2/3 -->
  <link rel="apple-touch-startup-image" href="./icons/app/splash/splash-750x1334.png"
        media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
  <!-- iPhone SE 1 / 5 / 5s -->
  <link rel="apple-touch-startup-image" href="./icons/app/splash/splash-640x1136.png"
        media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />

  <link rel="stylesheet" href="./css/styles.css" />
  <title>Frosthaven Companion</title>
</head>
<body>
  <div id="app" class="app">
    <div id="view"></div>
  </div>
  <script type="module" src="./js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
